version: '3.9'

services:
  # Infrastructure
  postgres:
    image: postgres:15-alpine
    container_name: socialcope-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-socialcope}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - socialcope

  redis:
    image: redis:7-alpine
    container_name: socialcope-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - socialcope

  # Gateway (Traefik)
  traefik:
    image: traefik:v2.10
    container_name: socialcope-gateway
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - socialcope
    depends_on:
      - gateway-service

  # Gateway Service
  gateway-service:
    build:
      context: ./services/gateway-service
      dockerfile: Dockerfile
    container_name: socialcope-gateway-service
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/socialcope}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - socialcope
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gateway.rule=Host(`localhost`)"
      - "traefik.http.services.gateway.loadbalancer.server.port=3000"

  # Frontend Service
  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    container_name: socialcope-frontend
    environment:
      NODE_ENV: development
      PORT: 3001
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost}
    ports:
      - "3001:3001"
    depends_on:
      - gateway-service
    networks:
      - socialcope

  # Canvas Service
  canvas-service:
    build:
      context: ./services/canvas-service
      dockerfile: Dockerfile
    container_name: socialcope-canvas
    environment:
      NODE_ENV: development
      PORT: 3002
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/socialcope}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - socialcope

  # Auth Service
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: socialcope-auth
    environment:
      NODE_ENV: development
      PORT: 3003
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/socialcope}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-prod}
    ports:
      - "3003:3003"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - socialcope

  # Realtime Service
  realtime-service:
    build:
      context: ./services/realtime-service
      dockerfile: Dockerfile
    container_name: socialcope-realtime
    environment:
      NODE_ENV: development
      PORT: 1234
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/socialcope}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    ports:
      - "1234:1234"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - socialcope

  # AI Service
  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    container_name: socialcope-ai
    environment:
      NODE_ENV: development
      PORT: 3004
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/socialcope}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      LLM_API_URL: ${LLM_API_URL:-http://localhost:11434}
    ports:
      - "3004:3004"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - socialcope

  # Export Service
  export-service:
    build:
      context: ./services/export-service
      dockerfile: Dockerfile
    container_name: socialcope-export
    environment:
      NODE_ENV: development
      PORT: 3005
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/socialcope}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    ports:
      - "3005:3005"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - socialcope

  # Asset Service
  asset-service:
    build:
      context: ./services/asset-service
      dockerfile: Dockerfile
    container_name: socialcope-asset
    environment:
      NODE_ENV: development
      PORT: 3006
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/socialcope}
      R2_BUCKET: ${R2_BUCKET:-socialcope}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY:-}
      R2_SECRET_KEY: ${R2_SECRET_KEY:-}
    ports:
      - "3006:3006"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - socialcope

  # Analytics Service
  analytics-service:
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile
    container_name: socialcope-analytics
    environment:
      NODE_ENV: development
      PORT: 3007
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/socialcope}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    ports:
      - "3007:3007"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - socialcope

  # Notification Service
  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: socialcope-notification
    environment:
      NODE_ENV: development
      PORT: 3008
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    ports:
      - "3008:3008"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - socialcope

  # Search Service
  search-service:
    build:
      context: ./services/search-service
      dockerfile: Dockerfile
    container_name: socialcope-search
    environment:
      NODE_ENV: development
      PORT: 3009
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/socialcope}
    ports:
      - "3009:3009"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - socialcope

volumes:
  postgres_data:

networks:
  socialcope:
    driver: bridge
